name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Check / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads channel + components from rust-toolchain.toml (single source of
      # truth shared with local dev) and caches the build.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Doctests
        run: cargo test --doc

      - name: Doc build
        run: cargo doc --no-deps --lib
        env:
          RUSTDOCFLAGS: -D warnings

  feature-matrix:
    name: Feature matrix (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # No `svg` means no render_svg/tests/examples (they all require
          # it) — this only proves the bare parse layer still compiles
          # thiserror-only, i.e. the default-build dependency-tree guarantee
          # holds even with every optional feature off.
          - features: --no-default-features
            run: cargo check --no-default-features --lib
          - features: --all-features
            run: cargo test --all-features --all-targets
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: ${{ matrix.features }}
        run: ${{ matrix.run }}
