# Tag-triggered release to crates.io via Trusted Publishing (OIDC) —
# no CARGO_REGISTRY_TOKEN secret involved.
#
# One-time manual setup (crates.io):
#   1. On crates.io, open the chess-diagram crate (or, for the first-ever
#      publish, https://crates.io/crates/new) → Settings → Trusted Publishing.
#   2. Add a GitHub publisher with:
#        Repository owner: xmiksay
#        Repository name:  chess-diagram
#        Workflow filename: release.yml
#        Environment:       (leave blank unless one is added below)
#   3. Push a `v<version>` tag matching the version in Cargo.toml to trigger
#      this workflow (see .claude/CLAUDE.md "Release procedure").
name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read
  id-token: write # required for crates.io OIDC Trusted Publishing

jobs:
  verify:
    name: Check / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Doctests
        run: cargo test --doc

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::tag v$tag_version does not match Cargo.toml version $crate_version"
            exit 1
          fi

      # Authenticates via OIDC using the trusted publisher config on
      # crates.io (see workflow header comment) — no token input needed.
      - name: Publish (Trusted Publishing / OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
